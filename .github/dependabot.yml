---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    branch-name-prefix: "feature/dependabot"
  - package-ecosystem: npm
    directory: "/javascript"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    branch-name-prefix: "feature/dependabot"
  - package-ecosystem: bundler
    directory: "/ruby"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    branch-name-prefix: "feature/dependabot"
    
